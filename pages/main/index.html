<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilkRoad-Next - 高性能反向代理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 800px;
        }
        .logo {
            font-size: 72px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 20px;
            color: #a0a0a0;
            margin-bottom: 40px;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .feature {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(233, 69, 96, 0.2);
        }
        .feature-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .feature-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .feature-desc {
            font-size: 14px;
            color: #888;
        }
        .status {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-label {
            color: #888;
        }
        .status-value {
            color: #4ade80;
            font-weight: 600;
        }
        .footer {
            font-size: 14px;
            color: #666;
        }
        .footer a {
            color: #e94560;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛤️</div>
        <h1>SilkRoad-Next</h1>
        <p class="subtitle">高性能、可扩展的反向代理软件</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🚀</div>
                <div class="feature-title">高性能</div>
                <div class="feature-desc">支持2000+并发连接，异步I/O模型</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔧</div>
                <div class="feature-title">URL重写</div>
                <div class="feature-desc">精准修正HTML/CSS/JS/XML/JSON</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-title">安全可靠</div>
                <div class="feature-desc">UA伪装、隐私保护、访问控制</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-title">可观测</div>
                <div class="feature-desc">完善的日志系统与监控面板</div>
            </div>
        </div>

        <div class="status">
            <div class="status-item">
                <span class="status-label">服务状态</span>
                <span class="status-value">运行中</span>
            </div>
            <div class="status-item">
                <span class="status-label">代理端口</span>
                <span class="status-value">8080</span>
            </div>
            <div class="status-item">
                <span class="status-label">管理端口</span>
                <span class="status-value">8081</span>
            </div>
            <div class="status-item">
                <span class="status-label">版本</span>
                <span class="status-value">V1 MVP</span>
            </div>
        </div>

        <div class="footer">
            <p>访问 <a href="/command">/command</a> 查看管理命令</p>
            <p style="margin-top: 8px;">基于 MIT License 开源 | <a href="https://github.com">GitHub</a></p>
        </div>
    </div>
</body>
</html>
