<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 - 错误网关 | SilkRoad-Next</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .error-message {
            font-size: 18px;
            color: #a0a0a0;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .home-link {
            display: inline-block;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: #fff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .home-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }
        .divider {
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
            margin: 30px auto;
            border-radius: 2px;
        }
        .footer {
            font-size: 14px;
            color: #666;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">🔌</div>
        <div class="error-code">502</div>
        <h1>错误网关</h1>
        <div class="divider"></div>
        <p class="error-message">
            代理服务器从上游服务器收到了无效响应。<br>
            目标服务器可能暂时不可用，请稍后重试。
        </p>
        <a href="/" class="home-link">返回首页</a>
        <p class="footer">SilkRoad-Next 反向代理服务</p>
    </div>
</body>
</html>
